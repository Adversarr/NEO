# TransolverModelConfig structure
name: transolver_experimental
d_model: ${corr_model_width}
num_layers: ${corr_model_depth}
num_registers: 4 # 1+3, recommend by ViTs
layer_scale_init: 0.22 # Use 0 to disable layer scale

# lifting part
embed_position:
  name: direct # xyz
  num_freqs: 63
  min_freqs_exp: -1.0
  max_freqs_exp: 6.0

lifting:
  num_hidden_layers: 0
  hidden_features: 256
  act: "silu"
  bias: true

# project part
project:
  num_hidden_layers: 0
  hidden_features: 256
  act: "silu"
  bias: true

# Transolver Block
attn:
  num_heads: ${corr_model_attn_heads}
  modes: ${corr_model_modes}
  bias: true
  dim_heads: ${corr_model_attn_dim_heads}
  enable_rope: false
  rope_min_log_freq: -5
  rope_max_log_freq: 3
  qk_norm: true
  norm_type: layernorm
  ffn:
    mlp_ratio: 2
    bias: true
    act: "silu"
    hidden_features:

ffn:
  mlp_ratio: 2
  bias: true
  act: "silu"
  hidden_features:

ffn_norm_type: layernorm

# TransolverModelConfig structure
name: transolver_experimental
d_model: 192
num_layers: 4
num_registers: 0 # 1+3, recommend by ViTs
layer_scale_init: 0 # Use 0 to fully disable layer scale

# lifting part
embed_position:
  name: sinusoidal
  num_freqs: 24
  min_freqs_exp: -2.0
  max_freqs_exp: 6.0

lifting:
  num_hidden_layers: 0
  hidden_features: 256
  act: "silu"
  bias: true

# project part
project:
  num_hidden_layers: 0
  hidden_features: 256
  act: "silu"
  bias: true

# Transolver Block
attn:
  num_heads: 4
  modes: 192
  bias: true
  dim_heads: 48
  enable_rope: true
  rope_min_log_freq: -5
  rope_max_log_freq: 3
  qk_norm: true
  norm_type: layernorm
  ffn:
    mlp_ratio: 2.66666
    bias: true
    act: "silu"
    hidden_features:


ffn:
  mlp_ratio: 2.66666
  bias: true
  act: "silu"
  hidden_features:

ffn_norm_type: layernorm

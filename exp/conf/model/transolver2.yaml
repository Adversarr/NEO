# TransolverModelConfig structure
name: transolver2
d_model: ${model_width}
num_layers: ${model_depth}
num_registers: 4 # 1+3, recommend by ViTs

# lifting part
embed_position:
  name: sinusoidal
  num_freqs: 63 # 63 * 2 * 3 = 378, very close to our model_width=384
  min_freqs_exp: -1.0
  max_freqs_exp: 6.0

lifting:
  num_hidden_layers: 0
  hidden_features: 256
  act: "silu"
  bias: true

# project part
project:
  num_hidden_layers: -1
  hidden_features: 256
  act: "silu"
  bias: true

# Transolver Block
attn:
  num_heads: ${model_attn_heads}
  modes: ${model_modes}
  bias: true
  dim_heads: ${model_attn_dim_heads}
  enable_rope: true
  rope_min_log_freq: -5
  rope_max_log_freq: 3
  qk_norm: true
  norm_type: layernorm
  subgen_enable_temperature: false
  sdpa_dropout_p: 0.0

ffn:
  mlp_ratio: 2.66666
  bias: true
  act: "silu"
  hidden_features:

ffn_norm_type: layernorm
